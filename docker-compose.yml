version: '3.8'

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: mini-tienda-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mini_tienda
      MYSQL_USER: tienda_user
      MYSQL_PASSWORD: tienda_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - mini-tienda-network

  # Aplicación Node.js
  app:
    build: .
    container_name: mini-tienda-app
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://tienda_user:tienda_password@db:3306/mini_tienda
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      OWNER_NAME: ${OWNER_NAME:-}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Mini-Tienda}
      VITE_APP_LOGO: ${VITE_APP_LOGO:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mini-tienda-network
    restart: unless-stopped

volumes:
  db_data:
    driver: local

networks:
  mini-tienda-network:
    driver: bridge
